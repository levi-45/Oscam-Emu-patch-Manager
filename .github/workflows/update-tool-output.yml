name: Update Tool Output

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * *' # täglich 00:00 UTC
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Repository auschecken
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Python einrichten
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Commit-Nachricht prüfen (nur echte Tool-Commits)
      - name: Commit-Nachricht prüfen
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD)
          MSG=$(git log -1 --pretty=%s)
          AUTHOR=$(git log -1 --pretty=%an)

          echo "Geänderte Dateien im letzten Commit:"
          echo "$FILES"
          echo "Letzte Commit-Nachricht: $MSG"
          echo "Autor: $AUTHOR"

          # Nur menschliche Änderungen an oscam_patch_manager.py prüfen
          if echo "$FILES" | grep -q "oscam_patch_manager.py" && [[ "$AUTHOR" != "github-actions[bot]" ]]; then
            if ! echo "$MSG" | grep -Eq "^(Fix|Add|Improve|Refactor|Docs): .+"; then
              echo "❌ Ungültige Commit-Nachricht für oscam_patch_manager.py!"
              echo "✔ Erlaubt: Fix:, Add:, Improve:, Refactor:, Docs:"
              echo "👉 Beispiel: Fix: falsche Patch-Erkennung bei OSCam r11734"
              exit 1
            fi
          else
            echo "Keine Prüfung nötig (entweder keine Tool-Änderung oder Commit von GitHub Actions)"
          fi

      # 4️⃣ Version automatisch erhöhen
      - name: Version automatisch erhöhen
        run: |
          MSG=$(git log -1 --pretty=%s)
          VERSION=$(grep '__version__' oscam_patch_manager.py | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "$MSG" in
            Fix:*) PATCH=$((PATCH+1)) ;;
            Improve:*|Add:*) MINOR=$((MINOR+1)); PATCH=0 ;;
            Refactor:*) PATCH=$((PATCH+1)) ;;
            Docs:*) echo "Docs-Commit – Version bleibt gleich" ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" oscam_patch_manager.py
          echo "🔢 Neue Version: $NEW_VERSION"

      # 5️⃣ CHANGELOG erstellen
      - name: CHANGELOG für oscam_patch_manager.py erzeugen
        run: |
          set -e  # Schritt bricht nur bei echten Fehlern ab

          DATE=$(date +'%d.%m.%Y %H:%M')
          echo "# Änderungen für oscam_patch_manager.py" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "Letzte Aktualisierung: $DATE" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          echo "## 🔧 Neue Verbesserungen am Script" >> CHANGELOG.md
          echo ""

          # Nur echte Commits nach Typ filtern (Fix/Add/Improve/Refactor/Docs)
          COMMITS=$(git log \
            --pretty=format:"* %s (%h)" \
            --invert-grep --grep="Auto-Update" \
            -- oscam_patch_manager.py | grep -E "^(Fix|Add|Improve|Refactor|Docs):")

          if [ -z "$COMMITS" ]; then
            echo "* Keine neuen Verbesserungen seit dem letzten Update" >> CHANGELOG.md
          else
            echo "$COMMITS" >> CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          # Tool-Status anhängen, Fehler ignorieren
          echo "## 📊 Aktueller Tool-Status" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo '```text' >> CHANGELOG.md
          python3 oscam_patch_manager.py >> CHANGELOG.md || echo "⚠️ Tool-Ausführung fehlgeschlagen"
          echo '```' >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          echo "---" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "ℹ️ Automatisch generiert durch GitHub Actions" >> CHANGELOG.md

      # 6️⃣ Änderungen committen (Version + CHANGELOG)
      - name: Änderungen committen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-Update: oscam_patch_manager Version & Changelog"
          file_pattern: CHANGELOG.md,oscam_patch_manager.py
