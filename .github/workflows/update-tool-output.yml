name: Update Tool Output

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * *' # täglich 00:00 UTC
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Repository auschecken
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Python einrichten
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Version automatisch erhöhen
      - name: Version automatisch erhöhen
        shell: bash
        run: |
          set +e
          trap 'echo "⚠️ Fehler ignoriert, Step läuft weiter"; true' ERR

          # Nur, wenn es schon Commits gibt
          if git rev-parse HEAD >/dev/null 2>&1; then
            MSG=$(git log -1 --pretty=%s)
            VERSION=$(grep '__version__' oscam_patch_manager.py | cut -d'"' -f2)
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

            case "$MSG" in
              Fix:*) PATCH=$((PATCH+1)) ;;
              Improve:*|Add:*) MINOR=$((MINOR+1)); PATCH=0 ;;
              Refactor:*) PATCH=$((PATCH+1)) ;;
              Docs:*) echo "Docs-Commit – Version bleibt gleich" ;;
              *) PATCH=$((PATCH+1)) ;;  # alle anderen Commits erhöhen Patch
            esac

            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" oscam_patch_manager.py
            echo "🔢 Neue Version: $NEW_VERSION"
          else
            echo "⚠️ Kein Commit gefunden – Version wird nicht erhöht"
          fi

      # 4️⃣ CHANGELOG erstellen (alle Commits anzeigen)
      - name: CHANGELOG für oscam_patch_manager.py erzeugen
        shell: bash
        run: |
          set +e
          trap 'echo "⚠️ Fehler ignoriert, Step läuft weiter"; true' ERR

          DATE=$(date +'%d.%m.%Y %H:%M') || DATE="Unbekannt"

          {
            echo "# Änderungen für oscam_patch_manager.py"
            echo "Letzte Aktualisierung: $DATE"
            echo ""
            echo "---"
            echo ""
            echo "## 🔧 Änderungen am Script"
            echo ""

            # Alle Commits anzeigen, außer Auto-Updates
            COMMITS=$(git log --pretty=format:"* %s (%h)" --invert-grep --grep="Auto-Update" -- oscam_patch_manager.py)
            if [ -z "$COMMITS" ]; then
              echo "* Keine Änderungen seit dem letzten Update"
            else
              echo "$COMMITS"
            fi

            echo ""
            echo "---"
            echo ""
            echo "## 📊 Aktueller Tool-Status"
            echo ""
            echo '```text'
            python3 oscam_patch_manager.py 2>&1 || echo "⚠️ Tool-Ausführung fehlgeschlagen"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "ℹ️ Automatisch generiert durch GitHub Actions"
          } > CHANGELOG.md

      # 5️⃣ Änderungen committen
      - name: Änderungen committen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-Update: oscam_patch_manager Version & Changelog"
          file_pattern: CHANGELOG.md,oscam_patch_manager.py
