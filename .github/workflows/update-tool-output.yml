name: Update Tool Output

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * *' # täglich um 00:00 UTC
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🔒 Schritt 1: Commit-Regeln prüfen
      - name: Commit-Nachricht prüfen
        run: |
          MSG=$(git log -1 --pretty=%s)

          echo "Letzte Commit-Nachricht:"
          echo "$MSG"

          if ! echo "$MSG" | grep -Eq "^(Fix|Add|Improve|Refactor|Docs): .+"; then
            echo "❌ Ungültige Commit-Nachricht!"
            echo "✔ Erlaubt: Fix:, Add:, Improve:, Refactor:, Docs:"
            echo "👉 Beispiel: Fix: falsche Patch-Erkennung bei OSCam r11734"
            exit 1
          fi

      # 🔢 Schritt 2: Version automatisch erhöhen
      - name: Version automatisch erhöhen
        run: |
          MSG=$(git log -1 --pretty=%s)

          # aktuelle Version auslesen
          VERSION=$(grep '__version__' oscam_patch_manager.py | cut -d'"' -f2)
          IFS='.' read MAJOR MINOR PATCH <<< "$VERSION"

          # Version je nach Commit-Typ erhöhen
          case "$MSG" in
            Fix:*) PATCH=$((PATCH+1)) ;;
            Improve:*|Add:*) MINOR=$((MINOR+1)); PATCH=0 ;;
            Refactor:*) PATCH=$((PATCH+1)) ;;
            Docs:*) exit 0 ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          # Version in der Datei aktualisieren
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" oscam_patch_manager.py

          echo "🔢 Neue Version: $NEW_VERSION"

      # Schritt 3: CHANGELOG generieren
      - name: CHANGELOG für oscam_patch_manager.py erzeugen
        run: |
          DATE=$(date +'%d.%m.%Y %H:%M')

          echo "# Änderungen für oscam_patch_manager.py" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "Letzte Aktualisierung: ${DATE}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          echo "## 🔧 Neue Verbesserungen am Script" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          # Nur echte Commits anzeigen (keine Auto-Updates)
          COMMITS=$(git log \
            --pretty=format:"* %s (%h)" \
            --invert-grep \
            --grep="Auto-Update" \
            -- oscam_patch_manager.py)

          if [ -z "$COMMITS" ]; then
            echo "* Keine neuen Verbesserungen seit dem letzten Update" >> CHANGELOG.md
          else
            echo "$COMMITS" >> CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          echo "## 📊 Aktueller Tool-Status" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo '```text' >> CHANGELOG.md
          python3 oscam_patch_manager.py >> CHANGELOG.md || echo "Tool-Ausführung fehlgeschlagen"
          echo '```' >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          echo "---" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "ℹ️ Automatisch generiert durch GitHub Actions" >> CHANGELOG.md

      # Schritt 4: Änderungen committen
      - name: Änderungen committen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-Update: oscam_patch_manager Changelog"
          file_pattern: CHANGELOG.md,oscam_patch_manager.py
