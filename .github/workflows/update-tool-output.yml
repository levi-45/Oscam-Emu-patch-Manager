name: Update Tool Output

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * *' # täglich 00:00 UTC
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Repository auschecken
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Python einrichten
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Version automatisch erhöhen
      - name: Version automatisch erhöhen
        shell: bash
        run: |
          set +e
          VERSION=$(grep '__version__' oscam_patch_manager.py | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH+1))  # Patch immer erhöhen
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" oscam_patch_manager.py
          echo "🔢 Neue Version: $NEW_VERSION"

      # 4️⃣ CHANGELOG erstellen
      - name: CHANGELOG für oscam_patch_manager.py erzeugen
        shell: bash
        run: |
          set -e
          DATE=$(date +'%d.%m.%Y %H:%M')

          # Datei immer neu schreiben, damit Git sie erkennt
          {
            echo "# Änderungen für oscam_patch_manager.py"
            echo "Letzte Aktualisierung: $DATE"
            echo ""
            echo "---"
            echo ""
            echo "## 🔧 Änderungen am Script"
            echo ""

            # Alle Commits seit letztem Auto-Update
            LAST_AUTO=$(git log --grep="Auto-Update" --pretty=format:"%H" -1)
            if [ -z "$LAST_AUTO" ]; then
              RANGE="HEAD"
            else
              RANGE="$LAST_AUTO..HEAD"
            fi

            git log $RANGE --pretty=format:"* %s (%h)" -- oscam_patch_manager.py

            echo ""
            echo "---"
            echo ""
            echo "## 📊 Aktueller Tool-Status"
            echo ""
            echo '```text'
            python3 oscam_patch_manager.py 2>&1 || echo "⚠️ Tool-Ausführung fehlgeschlagen"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "ℹ️ Automatisch generiert durch GitHub Actions"
          } > CHANGELOG.md

      # 5️⃣ Änderungen committen – immer committen, auch wenn nur Timestamp geändert
      - name: Änderungen committen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-Update: oscam_patch_manager Version & Changelog"
          file_pattern: |
            CHANGELOG.md
            oscam_patch_manager.py
          commit_user_name: github-actions
          commit_user_email: github-actions@github.com
          allow_empty_commit: true   # <-- WICHTIG: commit auch bei minimaler Änderung
